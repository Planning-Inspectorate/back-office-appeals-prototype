pr: none
trigger:
  branches:
    include:
      - main

pool: pins-odt-agent-pool

resources:
  repositories:
    - repository: templates
      type: github
      endpoint: Planning-Inspectorate
      name: Planning-Inspectorate/common-pipeline-templates
      ref: refs/tags/release/3.21.1

extends:
  template: stages/wrapper_cd.yml@templates
  parameters:
    gitFetchDepth: 0
    globalVariables:
      - template: .azure/pipelines/azure-pipelines-variables.yml@self
    validationJobs:
      - name: Build & Deploy
        steps:
          - template: ../steps/azure_web_app_docker_build_push.yml@templates
            parameters:
              azurecrName: pinscrsharedtoolinguks
              dockerfilePath: $(Build.SourcesDirectory)/Dockerfile
              repository: prototypes/appeals-back-office
          - name: Deploy
            steps:
              - checkout: self
              - template: ../steps/azure_web_app_deploy_slot.yml@templates
                parameters:
                  appName: pins-app-prototype-appeals-back-office-dkr
                  appResourceGroup: pins-rg-prototypes-dev
                  azurecrName: pinscrsharedtoolinguks
                  repository: prototypes/appeals-back-office
                  slot: default